<!-- Sección de proyectos: itera sobre el array tipado del componente -->
<div class="py-16 md:py-36">

  <h2 class="text-3xl text-[#f2f2f2] font-semibold mb-6 flex gap-x-3 items-center">
    <i class="fa-solid fa-briefcase" aria-hidden="true"></i>Proyectos
  </h2>

  <section class="flex flex-col gap-y-16">

    <!--
      @for itera sobre proyectos tipados con la interfaz Proyecto.
      `track proyecto.titulo` permite a Angular identificar cada elemento
      y reutilizar nodos del DOM en vez de recrearlos (mejor rendimiento).
    -->
    @for (proyecto of proyectos; track proyecto.titulo) {
      <article>
        <h3 class="text-2xl font-semibold text-yellow-200 mb-2">{{ proyecto.titulo }}</h3>
        <p class="text-lg mb-4 text-balance text-gray-300">{{ proyecto.descripcion }}</p>

        <!-- Lista de tecnologías usadas en el proyecto -->
        <ul class="flex gap-x-2 flex-row flex-wrap mb-2">
          @for (tag of proyecto.tags; track tag) {
            <li>
              <span class="rounded-full bg-white/10 text-gray-300 text-xs font-medium inline-flex items-center py-1 px-2">
                {{ tag }}
              </span>
            </li>
          }
        </ul>

        <!-- Imagen de captura: alt descriptivo definido en los datos del proyecto -->
        <img [src]="proyecto.imagen" [alt]="proyecto.alt" class="rounded shadow-2xl shadow-white/10">
      </article>
    }

  </section>
</div>
